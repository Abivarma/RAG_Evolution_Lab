[embedding]
model = "BAAI/bge-m3"
batch_size = 64
dimension = 1024
device = "mps"

[reranker]
model = "BAAI/bge-reranker-v2-m3"
top_k_candidates = 50
top_k_final = 5
device = "mps"
batch_size = 32

[hybrid]
rrf_k = 60

[query_rewriter]
model = "qwen2.5:14b"
n_paraphrases = 2
temperature = 0.3

[llm]
model = "qwen2.5:14b"
temperature = 0.1
max_tokens = 512
top_k_context = 5

[chunking]
chunk_size = 512
overlap = 50
separators = ["\n\n", "\n", ". ", " "]

[qdrant]
host = "localhost"
port = 6333
collection = "arxiv_stage2"
hnsw_m = 16
hnsw_ef_construct = 100

[data]
abstracts_path = "data/arxiv_abstracts_10k.json"

[run]
benchmark = "ragbench"
n_samples = 100
output_dir = "results/stage_2"
top_k = 10

[ablation]
use_query_rewriting = true
use_hybrid = true
use_reranker = true
use_semantic_chunking = true
