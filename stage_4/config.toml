[lightrag]
working_dir = "data/stage_4_lightrag"
query_mode = "hybrid"
max_tokens = 32768

[llm]
model = "qwen2.5:14b"
temperature = 0.1
max_tokens = 512

[embedding]
# Set model to "bge-m3:latest" if ollama embed worked, or "BAAI/bge-m3" for sentence-transformers
model = "bge-m3:latest"
dim = 1024
batch_size = 4
# backend: "ollama" or "sentence_transformers"
backend = "sentence_transformers"

[corpus]
corpus_path = "data/stage_4_corpus.json"

[retrieval]
top_k_graph = 10
top_k_vector = 10
rrf_k = 60

[run]
benchmark = "multihop"
n_samples = 20
output_dir = "results/stage_4"
top_k = 10
